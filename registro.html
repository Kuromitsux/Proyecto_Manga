<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Proyecto Manga</title>
    <link rel="stylesheet" href="estilos.css">
</head>

<body>
    <header>
        <h1>Proyecto Manga</h1>
        <p>Registro de lectores</p>
    </header>

    <nav>
        <a href="index.html">Inicio</a>
        <a href="catalogo.html">Catálogo</a>
        <a href="registro.html">Registro</a>
    </nav>

    <main>
        <section>
            <h2>Registro de Lectores</h2>
            <p> Completa el formulario para registrarte en Proyecto Manga</p>

            <form>
                <label for="usuario">Nombre de usuario:</label>
                <input type="text" id="usuario" required>

                <br><br>

                <label for="clave">Contraseña:</label>
                <input type="password" id="clave" required>

                <br><br>

                <label for="correo">Correo electrónico:</label>
                <input type="email" id="correo" required>

                <br><br>

                <label for="edad">Edad:</label>
                <input type="number" id="edad" min="16" required>

                <br><br>

                <button type="submit">Registrarse</button>
            </form>

        </section>
    </main>

    <footer>
        <p>Proyecto Manga - Programacion Front End 2026</p>
        <p>Desarrollado por Karla Fuentes</p>
    </footer>

</body>

</html>
